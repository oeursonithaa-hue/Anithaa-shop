<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dress</title>
    <link rel="stylesheet" href="Dress Shop.css">

    
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="cart-body">

    <header>
        <a href="#" class="logo">Dress Shop</a>

        <nav>
            <a href="./index.html">Home</a>
            <a href="./About.html">About</a>
            <a href="./Products.html">Products</a>
            <a href="./Review.html">Review</a>
            <a href="./Contact.html">Contact</a>
        </nav>
    </header>

    <section class="Cart" id="Cart">

    <h1 class="heading">
        Welcome to<span> your cart</span>
    </h1>

<div class="cart-box">

    <div class="right-image">
    <img src="Picture Folder/Popular/Other cart pic.jpg" alt="Promo Dress">
</div>

<a href="./Products.html">
    <i class="fa-solid fa-arrow-left back"></i>

</a>

<h1>Your Cart</h1>
<div id="cart-list"></div>
<div class="cart-total">g
    <span>Subtotal</span><span id="subtotal">$0</span>
</div>
<div>
    <span>Delivery</span>
    <span>$1.5</span>

</div>
<div class="line"></div>
<div>
    <strong>Total</strong>
    <strong id="total">$0</strong>

</div>
<a href="./Checkout.html">
    <button class="checkout">Checkout</button>
</a>
<body>

    

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let list = document.getElementById("cart-list");

let subtotal = 0;
let delivery = 1.5;

if(cart.length===0){
    list.innerHTML="<p class='empty'>Your cart is empty</p>";

    delivery = 0;
}

cart.forEach((item,index)=>{

    subtotal += item.price;

    list.innerHTML += `
    
    <div class="cart-item">

        <img src="${item.image}">

        <div class="cart-info">

            <h3>${item.name}</h3>

            <p>$${item.price}</p>

        </div>

        <button
        class="remove"
        onclick="removeItem(${index})">

        ×

        </button>

    </div>

    `;

});

let total = subtotal + delivery;

document.getElementById("subtotal").innerHTML =
"$" + subtotal.toFixed(2);

document.getElementById("total").innerHTML =
"$" + total.toFixed(2);


function removeItem(index){

    cart.splice(index,1);

    localStorage.setItem(
        "cart",
        JSON.stringify(cart)
    );

    location.reload();

}

</script>
